# ═══════════════════════════════════════════════════════════════════════════════
#  Aura Sentinel — Secrets
#  In production: use AWS Secrets Manager + External Secrets Operator instead.
#  Values here are base64-encoded. Generate with:
#    echo -n "neo4j/password123" | base64
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-credentials
  namespace: aura-sentinel
  labels:
    app: neo4j
type: Opaque
data:
  # "neo4j/password123" in base64
  auth: bmVvNGovcGFzc3dvcmQxMjM=
  # "password123" in base64
  password: cGFzc3dvcmQxMjM=
---
# Optional: Discord/Slack webhook (set if using alerts)
apiVersion: v1
kind: Secret
metadata:
  name: webhook-credentials
  namespace: aura-sentinel
type: Opaque
stringData:
  # Replace with your actual webhook URLs — stringData auto-encodes
  discord-webhook-url: ""
  slack-webhook-url: ""
